appId: com.talysman.app
productName: Talysman
copyright: Copyright © 2026

directories:
  output: dist
  buildResources: apps/desktop/build

extraMetadata:
  main: apps/desktop/out/main/index.cjs

files:
  - apps/desktop/out/**/*
  - package.json

# Embed the native service binaries staged by scripts/build-native.mjs for the selected target.
extraResources:
  - from: apps/desktop/resources/bin/current
    to: bin
    filter:
      - '**/*'

win:
  signAndEditExecutable: false
  target:
    - nsis
  # No explicit icon: electron-builder auto-generates the .ico from build/icon.png (256×256).
  # Replace build/icon.png with real branding before shipping.
  # Code signing (Authenticode) is required for auto-update + to avoid SmartScreen.
  # Wired in Phase 4; leave unsigned for local dev builds.

nsis:
  oneClick: false
  perMachine: true # service install needs machine scope + elevation
  allowElevation: true
  allowToChangeInstallationDirectory: true
  include: native/windows/installer/nsis-include.nsh
  artifactName: ${productName}-Setup-${version}.${ext}

linux:
  target:
    - deb
  category: Utility
  maintainer: Talysman <support@talysman.app>
  artifactName: ${productName}-${version}-${arch}.${ext}

# The deb is the only Linux artifact. It ships the privileged daemon and installs it
# via the after-install hook. On NixOS the same deb is unpacked by pkgs/snorlax in the
# nixos-config repo (dpkg + autoPatchelf); there the daemon is built from source and
# started by a declarative systemd unit instead of the deb hooks.
deb:
  afterInstall: native/linux/installer/after-install.sh
  afterRemove: native/linux/installer/after-remove.sh
  fpm:
    - --depends=nftables
    - --depends=systemd
    - --before-remove=native/linux/installer/before-remove.sh

publish:
  provider: generic
  url: https://example.invalid/updates # replaced via UPDATE_FEED_URL in Phase 4
