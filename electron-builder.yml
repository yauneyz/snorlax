appId: com.talysman.app
productName: Talysman
copyright: Copyright © 2026
forceCodeSigning: true
electronUpdaterCompatibility: ">= 2.16"
protocols:
  - name: Talysman authentication and billing callbacks
    schemes:
      - talysman

directories:
  output: dist
  # Brand assets live in assets/brand (source SVGs + committed rasters); see its README to
  # regenerate. Each platform below points at the pre-built icon for its own format.
  buildResources: assets/brand/generated

extraMetadata:
  main: apps/desktop/out/main/index.cjs

files:
  - apps/desktop/out/**/*
  - package.json

# Embed the native service binaries staged by scripts/build-native.mjs for the selected target.
extraResources:
  - from: apps/desktop/resources/bin/current
    to: bin
    filter:
      - "**/*"
  # Runtime brand images. `files:` only ships apps/desktop/out, so without this the tray and the
  # window icon resolve to nothing in a packaged build. tray.ts looks them up flat under
  # process.resourcesPath, so they land at the resources root.
  - from: apps/desktop/resources
    to: .
    filter:
      - "*.png"

win:
  target:
    - nsis
  icon: assets/brand/generated/windows/icon.ico
  # Release builds fail closed when Authenticode credentials are unavailable.

nsis:
  installerIcon: assets/brand/generated/windows/icon.ico
  uninstallerIcon: assets/brand/generated/windows/icon.ico
  installerHeaderIcon: assets/brand/generated/windows/icon.ico
  oneClick: false
  perMachine: true # service install needs machine scope + elevation
  allowElevation: true
  allowToChangeInstallationDirectory: true
  include: native/windows/installer/nsis-include.nsh
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}

mac:
  target:
    - dmg
    - zip
  icon: assets/brand/generated/macos/icon.icns
  category: public.app-category.productivity
  artifactName: ${productName}-${version}-${arch}.${ext}
  hardenedRuntime: true
  notarize: true
  # A DMG has no install hooks; the app requests administrator approval on first run and after a
  # service-version change, then verifies the restarted LaunchDaemon.

linux:
  target:
    - deb
    - AppImage
  # A directory of NxN.png files: electron-builder installs each into the matching
  # hicolor icon theme size so desktop environments pick the right one.
  icon: assets/brand/generated/linux
  syncDesktopName: true
  category: Utility
  maintainer: Talysman <support@talysman.app>
  artifactName: ${productName}-${version}-${arch}.${ext}

# The deb is the only PUBLIC Linux artifact (uploaded by scripts/upload-release.mjs and
# served by /download). It ships the privileged daemon and installs it via the
# after-install hook. The AppImage is local-only: release-local.mjs stages it for the
# NixOS install (wrapped via appimageTools in nixos-config), where the daemon is built
# from source and started by a declarative systemd unit instead.
appImage:
  artifactName: ${productName}-${version}-${arch}.${ext}

deb:
  afterInstall: native/linux/installer/after-install.sh
  afterRemove: native/linux/installer/after-remove.sh
  fpm:
    - --depends=nftables
    - --depends=systemd
    - --before-remove=native/linux/installer/before-remove.sh

publish:
  provider: generic
  # scripts/build.mjs loads this public base URL from the generated production env. Platform and
  # architecture directories prevent metadata collisions when release jobs run independently.
  url: ${env.UPDATE_FEED_URL}/${os}/${arch}
  # S3 supports byte ranges but not multipart ranges in one request.
  useMultipleRangeRequest: false
