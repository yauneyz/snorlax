appId: com.talysman.app
productName: Talysman
copyright: Copyright © 2026

protocols:
  - name: Talysman authentication and billing callbacks
    schemes:
      - talysman

directories:
  output: dist
  buildResources: apps/desktop/build

extraMetadata:
  main: apps/desktop/out/main/index.cjs

files:
  - apps/desktop/out/**/*
  - package.json

# Embed the native service binaries staged by scripts/build-native.mjs for the selected target.
extraResources:
  - from: apps/desktop/resources/bin/current
    to: bin
    filter:
      - '**/*'

win:
  signAndEditExecutable: false
  target:
    - nsis
  # No explicit icon: electron-builder auto-generates the .ico from build/icon.png (256×256).
  # Replace build/icon.png with real branding before shipping.
  # Code signing (Authenticode) is required for auto-update + to avoid SmartScreen.
  # Wired in Phase 4; leave unsigned for local dev builds.

nsis:
  oneClick: false
  perMachine: true # service install needs machine scope + elevation
  allowElevation: true
  allowToChangeInstallationDirectory: true
  include: native/windows/installer/nsis-include.nsh
  artifactName: ${productName}-Setup-${version}.${ext}

mac:
  target:
    - dmg
  category: public.app-category.productivity
  artifactName: ${productName}-${version}-${arch}.${ext}
  # No hardened runtime / notarization yet: local dev builds only. Signing + notarization are
  # required before distribution (wired in Phase 4, alongside Windows Authenticode).
  identity: null
  # A dmg has no install hooks; the privileged LaunchDaemon is registered on first run via
  # `sudo talysman-svcctl install` (see native/macos/README.md).

linux:
  target:
    - deb
    - AppImage
  syncDesktopName: true
  category: Utility
  maintainer: Talysman <support@talysman.app>
  artifactName: ${productName}-${version}-${arch}.${ext}

# The deb is the only PUBLIC Linux artifact (uploaded by scripts/upload-release.mjs and
# served by /download). It ships the privileged daemon and installs it via the
# after-install hook. The AppImage is local-only: release-local.mjs stages it for the
# NixOS install (wrapped via appimageTools in nixos-config), where the daemon is built
# from source and started by a declarative systemd unit instead.
appImage:
  artifactName: ${productName}-${version}-${arch}.${ext}

deb:
  afterInstall: native/linux/installer/after-install.sh
  afterRemove: native/linux/installer/after-remove.sh
  fpm:
    - --depends=nftables
    - --depends=systemd
    - --before-remove=native/linux/installer/before-remove.sh

publish:
  provider: generic
  url: https://example.invalid/updates # replaced via UPDATE_FEED_URL in Phase 4
