name: Release desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: desktop-production-release
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  RELEASE_ARTIFACTS_BUCKET: ${{ vars.RELEASE_ARTIFACTS_BUCKET }}
  RELEASE_PUBLIC_BASE_URL: ${{ vars.RELEASE_PUBLIC_BASE_URL }}
  UPDATE_FEED_URL: ${{ vars.RELEASE_PUBLIC_BASE_URL }}/desktop
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  windows:
    runs-on: windows-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:upload -- --require win
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

  macos:
    runs-on: macos-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: pnpm install --frozen-lockfile
      - name: Write App Store Connect API key
        run: printf '%s' "$APPLE_API_KEY_P8" > "$RUNNER_TEMP/notarization-key.p8"
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      - run: pnpm release:upload -- --require mac
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/notarization-key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  linux:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: sudo apt-get update && sudo apt-get install --yes dpkg-dev
      - run: pnpm install --frozen-lockfile
      - name: Import APT signing key
        run: printf '%s' "$APT_GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
      - run: pnpm release:upload -- --require linux
        env:
          APT_SIGNING_KEY_ID: ${{ vars.APT_SIGNING_KEY_ID }}
          APT_SIGNING_KEY_PASSPHRASE: ${{ secrets.APT_SIGNING_KEY_PASSPHRASE }}

  verify:
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:verify
